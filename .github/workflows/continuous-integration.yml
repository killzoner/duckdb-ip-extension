name: continuous-integration

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOCKER: ""
  # libduckdb-sys downloads a prebuilt libduckdb (no C++ compile)
  DUCKDB_DOWNLOAD_LIB: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      cancel-in-progress: true
      group: ${{ github.workflow }}-build-${{ github.event.pull_request.number || github.ref }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - run: cargo build --all --all-targets --all-features
  lint:
    runs-on: ubuntu-latest
    concurrency:
      cancel-in-progress: true
      group: ${{ github.workflow }}-lint-${{ github.event.pull_request.number || github.ref }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --all --all-targets --all-features -- -D warnings
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-shear,cargo-neat
      - run: cargo shear
      - run: cargo neat -m -p -f --package-workspace-meta-values rust-version,edition,license,homepage,repository,publish
  test:
    runs-on: ubuntu-latest
    concurrency:
      cancel-in-progress: true
      group: ${{ github.workflow }}-test-${{ github.event.pull_request.number || github.ref }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true # extension-ci-tools, used by `make build-extension`
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - run: make build-extension PROFILE=dev
      - run: cargo test --all-targets --all-features --workspace
  fmt:
    runs-on: ubuntu-latest
    concurrency:
      cancel-in-progress: true
      group: ${{ github.workflow }}-fmt-${{ github.event.pull_request.number || github.ref }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all
      - uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli@0.9.3
      - name: Run cargo sort
        run: taplo format
      - name: Check for a diff
        run: git diff --exit-code
  version-sync:
    runs-on: ubuntu-latest
    concurrency:
      cancel-in-progress: true
      group: ${{ github.workflow }}-version-sync-${{ github.event.pull_request.number || github.ref }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - run: make sync-versions
      - name: Check for a diff
        run: git diff --exit-code
      - run: make check-duckdb-pins
  feature-check:
    runs-on: ubuntu-latest
    concurrency:
      cancel-in-progress: true
      group: ${{ github.workflow }}-feature-check-${{ github.event.pull_request.number || github.ref }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - run: cargo hack check --feature-powerset --workspace
  cargo-deny-checks:
    runs-on: ubuntu-latest
    concurrency:
      cancel-in-progress: true
      group: ${{ github.workflow }}-cargo-deny-checks-${{ github.event.pull_request.number || github.ref }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny
        run: cargo deny -L error --workspace check bans advisories sources
  miri:
    runs-on: ubuntu-latest
    concurrency:
      cancel-in-progress: true
      group: ${{ github.workflow }}-miri-${{ github.event.pull_request.number || github.ref }}
    env:
      MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-symbolic-alignment-check"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
          components: miri
      - run: cargo +nightly miri setup
      - run: cargo +nightly miri test --lib
