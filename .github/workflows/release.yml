name: Extension Release
on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@main
    with:
      extension_name: duckdb_ip_extension
      duckdb_version: v1.2.0
      # Must match the ref of `_extension_distribution.yml@main` above; v1.2.0
      # predates the `scripts/extbuild/go.mod` the matrix-generation job needs.
      ci_tools_version: main
      # Installs Rust on each matrix runner; without this, `cargo` is missing.
      extra_toolchains: "rust"
    secrets: inherit

  release:
    name: Attach artifacts to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*.duckdb_extension*
          fail_on_unmatched_files: true
